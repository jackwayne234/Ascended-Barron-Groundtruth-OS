# Ascended Barron: GroundTruth OS — touchpad defaults.
# Enable tap-to-click on touchpads so a light tap registers as a click (instead
# of having to physically press the pad down). Two-finger scroll stays on by
# libinput default; right-click and everything else are left at their defaults.
Section "InputClass"
    Identifier "touchpad tap-to-click"
    MatchIsTouchpad "on"
    Driver "libinput"
    Option "Tapping" "on"
EndSection
